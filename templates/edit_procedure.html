{% extends "base.html" %}

{% block content %}
<h1 class="mb-4">Edit Procedure</h1>

<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5>Edit Procedure Details</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="procedure_name" class="form-label">Procedure Name</label>
                        <input type="text" class="form-control" id="procedure_name" name="procedure_name"
                            value="{{ procedure.procedure_name }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="procedure_cost" class="form-label">Procedure Cost (Rs.)</label>
                        <input type="number" step="0.01" class="form-control" id="procedure_cost" name="procedure_cost"
                            value="{{ procedure.procedure_cost }}">
                    </div>

                    <div class="mb-3">
                        <label for="paid_amount" class="form-label">Amount Paid (Rs.)</label>
                        <input type="number" step="0.01" class="form-control" id="paid_amount" name="paid_amount"
                            value="{{ procedure.paid_amount }}">
                        <div class="form-text">This will update the visit's total paid amount</div>
                    </div>

                    <div class="mb-3">
                        <label for="notes" class="form-label">Notes</label>
                        <textarea class="form-control" id="notes" name="notes"
                            rows="3">{{ procedure.notes or '' }}</textarea>
                    </div>

                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a href="{{ url_for('visit_detail', visit_id=procedure.visit_id) }}"
                        class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
