{% extends "base.html" %}

{% block content %}
<h1 class="mb-4">Dashboard</h1>

<div class="row">
    <div class="col-md-4 mb-3">
        <div class="card text-white bg-primary">
            <div class="card-body">
                <h5 class="card-title">Today's Visits</h5>
                <h2 class="display-4">{{ today_visits }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-4 mb-3">
        <div class="card text-white bg-success">
            <div class="card-body">
                <h5 class="card-title">Today's Revenue</h5>
                <h2 class="display-4">Rs. {{ "%.2f"|format(today_revenue) }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-4 mb-3">
        <div class="card text-white bg-info">
            <div class="card-body">
                <h5 class="card-title">Total Patients</h5>
                <h2 class="display-4">{{ total_patients }}</h2>
            </div>
        </div>
    </div>
</div>

<div class="row mt-4">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5>Quick Actions</h5>
            </div>
            <div class="card-body">
                <a href="{{ url_for('add_patient') }}" class="btn btn-primary mb-2">➕ New Patient</a>
                <a href="{{ url_for('patients') }}" class="btn btn-success mb-2">📋 Patient List</a>
                <a href="{{ url_for('reports') }}" class="btn btn-info mb-2">📊 View Reports</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
